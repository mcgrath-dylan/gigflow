subreddits:
  - forhire
  - slavelabour
  - freelance_forhire
  - WorkOnline
  - HireaWriter

keywords:
  - data cleanup
  - data cleaning
  - data entry
  - data migration
  - data formatting
  - data governance
  - spreadsheet
  - csv
  - excel
  - google sheets
  - documentation
  - policy
  - report
  - analysis

filters:
  max_age_hours: 48
  min_title_tag: "[hiring]"
  tag_exempt_subreddits:
    - WorkOnline
    - HireaWriter

hn:
  enabled: true
  max_comment_chars: 800
  max_comments: 200
  require_terms:
    - contract
    - freelance
    - part-time
    - part time
    - consulting
    - consultant

pre_screen:
  min_body_words: 30
  skip_phrases:
    - "virtual assistant"
    - "va needed"
    - "ongoing basis"
    - "long-term"
    - "long term"
    - "test project"
    - "test task"
    - "unpaid"
