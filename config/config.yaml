subreddits:
  - forhire
  - slavelabour
  - freelance_forhire
  - WorkOnline
  - HireaWriter
  - learnpython

keywords:
  # Technical gig types (high volume on Reddit/HN)
  - web scraping
  - web scraper
  - scraper
  - scraping
  - python script
  - python bot
  - automation
  - automate
  - api integration
  - data pipeline
  - etl
  - data extraction
  - data transformation
  - technical writing
  # Specific tools people name in posts
  - selenium
  - pandas
  - google sheets
  - excel
  - sql
  - airtable
  - parse
  - parsing
  # Data work (works for both markets)
  - data cleanup
  - data cleaning
  - data quality
  - data analysis
  - data report
  - csv
  - json parsing

filters:
  max_age_hours: 48
  min_title_tag: "[hiring]"
  tag_exempt_subreddits:
    - freelance_forhire
    - WorkOnline
    - HireaWriter

hn:
  enabled: true
  max_comment_chars: 800
  max_comments: 200
  require_terms:
    - contract
    - freelance
    - part-time
    - part time
    - consulting
    - consultant

freelancer:
  enabled: true
  # Freelancer.com job category IDs: 13=Python, 116=Web Scraping,
  # 36=Data Processing, 43=Data Entry
  job_ids:
    - 13
    - 116
    - 36
    - 43
  limit: 25
  min_budget_usd: 20

google_alerts:
  enabled: true
  feeds:
    - "https://www.google.com/alerts/feeds/13659000287574271115/6993236278715754483"
    - "https://www.google.com/alerts/feeds/13659000287574271115/2719749338087460902"
    - "https://www.google.com/alerts/feeds/13659000287574271115/1141669749260850374"
    - "https://www.google.com/alerts/feeds/13659000287574271115/3592513687534663865"

gmail:
  enabled: true
  credentials_file: config/gmail_credentials.json
  token_file: data/gmail_token.json

pre_screen:
  min_body_words: 30
  skip_phrases:
    - "virtual assistant"
    - "va needed"
    - "ongoing basis"
    - "long-term"
    - "long term"
    - "test project"
    - "test task"
    - "unpaid"
    - "full-time"
    - "full time"
    - "permanent"
    - "equity only"
    - "need access to my server"
    - "ongoing maintenance"
