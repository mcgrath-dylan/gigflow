subreddits:
  - forhire
  - slavelabour
  - freelance_forhire
  - WorkOnline
  - HireaWriter

keywords:
  # Technical gig types (high volume on Reddit/HN)
  - web scraping
  - web scraper
  - scraper
  - scraping
  - python script
  - python bot
  - automation
  - automate
  - api integration
  - data pipeline
  - etl
  - data extraction
  - data transformation
  - technical writing
  # Data work (works for both markets)
  - data cleanup
  - data cleaning
  - data quality
  - data analysis
  - data report
  - csv
  - json parsing

filters:
  max_age_hours: 48
  min_title_tag: "[hiring]"
  tag_exempt_subreddits:
    - WorkOnline
    - HireaWriter

hn:
  enabled: true
  max_comment_chars: 800
  max_comments: 200
  require_terms:
    - contract
    - freelance
    - part-time
    - part time
    - consulting
    - consultant

pre_screen:
  min_body_words: 30
  skip_phrases:
    - "virtual assistant"
    - "va needed"
    - "ongoing basis"
    - "long-term"
    - "long term"
    - "test project"
    - "test task"
    - "unpaid"
    - "full-time"
    - "full time"
    - "permanent"
    - "equity only"
    - "need access to my server"
    - "ongoing maintenance"
